name: Supabase Keep-Alive

# 두 가지 일시정지를 모두 방지합니다.
# 1) Supabase 무료 플랜: 7일간 요청 없으면 DB 일시정지 → 매일 ping
# 2) GitHub Actions: 60일간 저장소 활동 없으면 예약 워크플로우 비활성화
#    → 약 20일마다 heartbeat 파일을 자동 커밋해 저장소를 "활성"으로 유지
#    (이러면 아무도 저장소를 안 건드려도 워크플로우가 영구히 살아있음)

on:
  schedule:
    # 매일 UTC 00:00 (한국시간 오전 9시)에 실행
    - cron: '0 0 * * *'
  workflow_dispatch:  # 수동 실행도 가능

permissions:
  contents: write  # heartbeat 커밋을 위해 쓰기 권한 필요

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Ping Supabase REST API
        run: |
          URL="https://jupyeldwarunpepudhpy.supabase.co/rest/v1/departments?select=name&limit=1"
          KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1cHllbGR3YXJ1bnBlcHVkaHB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxOTk0NDIsImV4cCI6MjA5MDc3NTQ0Mn0.Nd5RXuRwju0GHlzFPWcEumlV8M835FqaxmUBDiRpgfg"
          echo "Supabase에 keep-alive 요청 전송..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY" \
            "$URL")
          echo "응답 코드: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Supabase 정상 - keep-alive 성공"
          else
            echo "⚠️ 응답 코드 $HTTP_CODE - 깨어나는 중이거나 오류"
          fi

      - name: Repo heartbeat (약 20일마다 커밋하여 워크플로우 자동 비활성화 방지)
        run: |
          HEARTBEAT_FILE=".github/keep-alive-heartbeat.txt"
          NOW=$(date +%s)
          LAST=$(cat "$HEARTBEAT_FILE" 2>/dev/null | head -n1 | grep -oE '^[0-9]+' || echo 0)
          DIFF_DAYS=$(( (NOW - LAST) / 86400 ))
          echo "마지막 heartbeat 이후 ${DIFF_DAYS}일 경과"
          if [ "$DIFF_DAYS" -ge 20 ]; then
            echo "$NOW" > "$HEARTBEAT_FILE"
            echo "마지막 갱신: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$HEARTBEAT_FILE"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$HEARTBEAT_FILE"
            git commit -m "chore: keep-alive heartbeat [skip ci]"
            git push
            echo "✅ heartbeat 커밋 완료 - 저장소 활성 상태 유지"
          else
            echo "ℹ️ 아직 20일 미경과 - heartbeat 커밋 생략"
          fi
