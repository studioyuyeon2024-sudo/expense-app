name: Supabase Keep-Alive

# Supabase 무료 플랜은 7일간 요청이 없으면 프로젝트를 일시정지합니다.
# 이 워크플로우가 매일 DB에 요청을 보내 일시정지를 방지합니다.

on:
  schedule:
    # 매일 UTC 00:00 (한국시간 오전 9시)에 실행
    - cron: '0 0 * * *'
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          URL="https://jupyeldwarunpepudhpy.supabase.co/rest/v1/departments?select=name&limit=1"
          KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1cHllbGR3YXJ1bnBlcHVkaHB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxOTk0NDIsImV4cCI6MjA5MDc3NTQ0Mn0.Nd5RXuRwju0GHlzFPWcEumlV8M835FqaxmUBDiRpgfg"
          echo "Supabase에 keep-alive 요청 전송..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY" \
            "$URL")
          echo "응답 코드: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Supabase 정상 - keep-alive 성공"
          else
            echo "⚠️ 응답 코드 $HTTP_CODE - 깨어나는 중이거나 오류"
            # 프로젝트가 일시정지 상태였다면 이 요청으로 깨어나기 시작함
            exit 0
          fi
