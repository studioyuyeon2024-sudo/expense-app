// Korean number converter
function numToKorean(n) {
  if(!n||n===0) return "영";
  const d=["","일","이","삼","사","오","육","칠","팔","구"];
  const u=["","십","백","천"];
  const b=["","만","억","조"];
  let str="", num=Math.abs(n), big=0;
  while(num>0){
    let chunk=num%10000, cStr="";
    for(let i=0;chunk>0;i++){cStr=(chunk%10?d[chunk%10]+u[i]:"")+cStr;chunk=Math.floor(chunk/10);}
    if(cStr) str=cStr+b[big]+str;
    num=Math.floor(num/10000); big++;
  }
  return str;
}

// Day of week in Korean
function getDayKr(dateStr){
  const days=["일","월","화","수","목","금","토"];
  try{const dt=new Date(dateStr.split(" ")[0]);return days[dt.getDay()];}catch{return "";}
}

// Determine 오찬/만찬 from time
function getMealType(dateStr){
  try{const h=parseInt(dateStr.split(" ")[1]?.split(":")[0]||"12");return h>=18?"만찬":"오찬";}catch{return "오찬";}
}

// Format date for document: "2026. 1. 12.(월) 12:50"
function fmtDocDate(dateStr){
  try{
    const parts=dateStr.split(" ");
    const [y,m,dd]=parts[0].split("-");
    const time=parts[1]||"";
    const timeShort=time.split(":").slice(0,2).join(":");
    const day=getDayKr(dateStr);
    return `${y}. ${parseInt(m)}. ${parseInt(dd)}.(${day}) ${timeShort}`;
  }catch{return dateStr;}
}

  try { localStorage.setItem(CUSTOM_PRESETS_KEY, JSON.stringify(presets)); } catch {}
}
function getAllPresets() {
  const custom = loadCustomPresets();
  return {...PRESETS, ...custom};
}
function getAllPresetNames() {
  return Object.keys(getAllPresets());
}

// Preset helper functions
const PRESET_KEY = "expense-app-preset";
function getStorageKey(presetName) { return `expense-app-v2-${presetName}`; }
function getSavedPreset() {
  try { return localStorage.getItem(PRESET_KEY) || ""; } catch { return ""; }
}
function savePresetChoice(name) {
  try { localStorage.setItem(PRESET_KEY, name); } catch {}
}
function getDefaultBudgets(categories) {
  const b = {};
  [...(categories["일반지출"]||[]),...(categories["일상경비"]||[])].forEach(c=>{b[c.id]=c.budget||0;});
  return b;
}

// Data migration: move old "expense-app-v2" data to preset-specific key
function migrateOldData() {
  try {
    const old = localStorage.getItem("expense-app-v2");
    if (!old) return;
    const savedPreset = getSavedPreset();
    if (!savedPreset) {
      // Auto-migrate to 교육위원회 (original preset)
      localStorage.setItem(getStorageKey("교육위원회"), old);
      savePresetChoice("교육위원회");
    }
    localStorage.removeItem("expense-app-v2");
  } catch {}
}
migrateOldData();

function loadData(presetName) {
  try { const d = localStorage.getItem(getStorageKey(presetName)); return d ? JSON.parse(d) : {rows:[],budgets:{}}; }
  catch { return {rows:[],budgets:{}}; }
}
// budgets 마이그레이션: flat {catId:amt} → yearly {"2026":{catId:amt}}
function migrateBudgets(budgets) {
  if (!budgets || typeof budgets !== "object") return {};
  const keys = Object.keys(budgets);
  if (!keys.length) return {};
  // 이미 연도별 구조인지 확인 (키가 4자리 숫자면 연도별)
  if (keys.every(k => /^\d{4}$/.test(k))) return budgets;
  // flat 구조 → 현재 연도로 마이그레이션
  const year = String(new Date().getFullYear());
  return { [year]: budgets };
}
function getYearBudgets(budgets, year) {
  return budgets[year] || {};
}
function saveData(presetName, d) {
  try { localStorage.setItem(getStorageKey(presetName), JSON.stringify(d)); return true; }
  catch { return false; }
}

function App() {
  const [presetName, setPresetName] = useState(() => getSavedPreset());
  const [rows, setRows] = useState([]);
  const [budgets, setBudgets] = useState({});
  const [view, setView] = useState("home");
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  const [filterTab, setFilterTab] = useState("미분류");
  const [filterMonth, setFilterMonth] = useState("all");
  const [selected, setSelected] = useState(new Set());
  const [batchCat, setBatchCat] = useState("");
  const [editId, setEditId] = useState(null);
  const [newRows, setNewRows] = useState([]);
  const [dragOver, setDragOver] = useState(false);
  const [previewTab, setPreviewTab] = useState("일반지출");
  const [previewCat, setPreviewCat] = useState("all");
  const [editBudget, setEditBudget] = useState(null);
  const [editCell, setEditCell] = useState(null);
  const [docModal, setDocModal] = useState(null); // {rows, catId, step, titleId, nValue, docText, mode}
  const [copied, setCopied] = useState(false);
  const [docSelected, setDocSelected] = useState(new Set()); // for multi-expense doc generation
  const [searchText, setSearchText] = useState("");
  const [discMonth, setDiscMonth] = useState(() => {
    const now = new Date();
    return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  });
  const [discTab, setDiscTab] = useState("일반지출");
  const [catNames, setCatNames] = useState({}); // {catId: "오버라이드 이름"}
  const [editCatName, setEditCatName] = useState(null); // catId being edited
  const [sideOpen, setSideOpen] = useState(false); // hamburger sidebar toggle
  const [sortDesc, setSortDesc] = useState(true); // true=최신순(내림), false=오래된순(오름)
  const [customDocTmpls, setCustomDocTmpls] = useState({}); // 커스텀 공문 템플릿
  const [docEditCat, setDocEditCat] = useState(null); // 공문 편집 중인 카테고리 ID
  const [budgetYear, setBudgetYear] = useState(() => String(new Date().getFullYear())); // 예산관리 연도
  const [addCatTab, setAddCatTab] = useState("일반지출"); // 카테고리 추가 탭
  const [addCatName, setAddCatName] = useState(""); // 카테고리 추가 이름
  const [addCatBudget, setAddCatBudget] = useState(""); // 카테고리 추가 예산
  const fRef = useRef(null);

  // Derive preset data
  const [allPresets, setAllPresets] = useState(() => getAllPresets());
  const [setupMode, setSetupMode] = useState(null); // null | "create" | "edit"
  const currentPreset = allPresets[presetName] || null;
  const CATEGORIES = useMemo(() => currentPreset ? currentPreset.categories : {"일반지출":[],"일상경비":[]}, [currentPreset]);
  const DOC_TEMPLATES = useMemo(() => ({...(currentPreset?.docTemplates || {}), ...customDocTmpls}), [currentPreset, customDocTmpls]);
  const ALL_CATS = useMemo(() => [
    ...(CATEGORIES["일반지출"]||[]).map(c=>({...c,tab:"일반지출"})),
    ...(CATEGORIES["일상경비"]||[]).map(c=>({...c,tab:"일상경비"})),
  ], [CATEGORIES]);
  const DEFAULT_BUDGETS = useMemo(() => getDefaultBudgets(CATEGORIES), [CATEGORIES]);

  // Preset selection handler
  const selectPreset = (name) => {
    const ap = getAllPresets();
    setAllPresets(ap);
    savePresetChoice(name);
    setPresetName(name);
    const preset = ap[name];
    const defB = getDefaultBudgets(preset.categories);
    const d = loadData(name);
    setRows(d.rows||[]);
    const mb = migrateBudgets(d.budgets||{});
    const yr = String(new Date().getFullYear());
    setBudgets({...mb, [yr]: {...defB, ...(mb[yr]||{})}});
    setCatNames(d.catNames||{});
    setCustomDocTmpls(d.customDocTmpls||{});
    setView("home");
    setSetupMode(null);
    setLoading(false);
  };

  // Save custom preset
  const saveNewPreset = (name, categories) => {
    const custom = loadCustomPresets();
    custom[name] = { categories, docTemplates: {} };
    saveCustomPresets(custom);
    setAllPresets(getAllPresets());
  };

  const updateBudget = (catId, val, year) => {
    const yr = year || budgetYear;
    const yrB = {...(budgets[yr]||{}), [catId]: parseAmt(val)};
    const newB = {...budgets, [yr]: yrB};
    persist(undefined, newB);
  };
  // 특정 연도의 예산 가져오기
  const getBudget = (catId, year) => {
    const yr = year || budgetYear;
    return (budgets[yr]||{})[catId] || 0;
  };

  // Generate document text
  const generateDoc = (row, tmpl, titleObj, nVal) => {
    const meal = getMealType(row.date);
    const mealKr = meal;
    const dateFormatted = fmtDocDate(row.date);
    const amtKr = numToKorean(row.amount);
    const loc = row.place + (row.extra?.["장소상세"] ? ` ${row.extra["장소상세"]}` : "");
    const people = row.extra?.["인원"] || row.extra?.["참석자"] || "N";
    const dateShort = (() => {
      try { const [y,m,d] = row.date.split(" ")[0].split("-"); return `${parseInt(m)}.${parseInt(d)}.`; } catch { return ""; }
    })();

    let title = titleObj.label;
    if (titleObj.hasN && nVal) title = title.replace("N", nVal);
    title = `(교육)${title}`;
    if (!titleObj.noAttendee && !titleObj.isStaff && dateShort) title += `(${dateShort})`;

    let intro = titleObj.intro;
    if (titleObj.hasN && nVal) intro = intro.replace("N", nVal);
    if (intro.includes("{meal}")) intro = intro.replace("{meal}", mealKr);

    let lines = [];
    lines.push(`제목  ${title}`);
    lines.push("");
    lines.push(`  ${intro}`);
    lines.push("");
    lines.push(`  1. ${titleObj.amtLabel} : 금${fmt(row.amount)}원(금${amtKr}원)`);
    lines.push(`  2. 일     시 : ${dateFormatted}`);
    lines.push(`  3. 장     소 : ${loc}`);
    if (titleObj.참석label && titleObj.참석desc) {
      lines.push(`  4. ${titleObj.참석label} : ${people}명(${titleObj.참석desc})`);
      lines.push(`  5. 지출방법 : ${tmpl.지출방법}`);
      lines.push(`  6. ${tmpl.예산label} : ${tmpl.예산과목}.  끝.`);
    } else {
      lines.push(`  4. 지출방법 : ${tmpl.지출방법}`);
      lines.push(`  5. ${tmpl.예산label} : ${tmpl.예산과목}.  끝.`);
    }

    return { title, body: lines.join("\n") };
  };

  // Generate combined document for 2+ expenses
  // 금액 가장 큰 건 = 메인, 나머지 = 서브
  // 금액: 전체 합산, 일시: 메인 시간 / 서브 중 가장 빠른 시간, 장소: 메인 장소 + "외 1"
  const generateCombinedDoc = (docRows, tmpl, titleObj, nVal) => {
    // Sort: larger amount first
    const sorted = [...docRows].sort((a,b) => b.amount - a.amount);
    const main = sorted[0];
    const subs = sorted.slice(1);
    const totalAmt = sorted.reduce((s,r) => s + r.amount, 0);
    const amtKr = numToKorean(totalAmt);
    const meal = getMealType(main.date);
    const dateShort = (() => { try { const [y,m,d]=main.date.split(" ")[0].split("-"); return `${parseInt(m)}.${parseInt(d)}.`; } catch { return ""; } })();

    // Title: 기존 템플릿과 동일 (1건용과 같은 방식)
    let title = titleObj.label;
    if (titleObj.hasN && nVal) title = title.replace("N", nVal);
    title = `(교육)${title}`;
    if (!titleObj.noAttendee && !titleObj.isStaff && dateShort) title += `(${dateShort})`;

    let intro = titleObj.intro;
    if (titleObj.hasN && nVal) intro = intro.replace("N", nVal);
    if (intro.includes("{meal}")) intro = intro.replace("{meal}", meal);

    // Date: 메인 시간 / 서브 중 가장 빠른 결제 시간
    const mainDate = fmtDocDate(main.date);
    // 서브 중 시간순 정렬하여 가장 빠른 건의 시간
    const subsSorted = [...subs].sort((a,b) => a.date.localeCompare(b.date));
    const subTimeShort = (() => {
      try { const t = subsSorted[0].date.split(" ")[1]||""; return t.split(":").slice(0,2).join(":"); } catch { return ""; }
    })();
    const dateStr = `${mainDate} / ${subTimeShort}`;

    // Place: larger amount place + "외 1" + optional location detail
    const locDetail = main.extra?.["장소상세"] ? `(${main.extra["장소상세"]})` : "";
    const placeStr = `${main.place} 외 1${locDetail}`;

    const people = main.extra?.["인원"] || main.extra?.["참석자"] || subs.find(r=>r.extra?.["인원"])?.extra?.["인원"] || subs.find(r=>r.extra?.["참석자"])?.extra?.["참석자"] || "N";

    let lines = [];
    lines.push(`제목  ${title}`);
    lines.push("");
    lines.push(`  ${intro}`);
    lines.push("");
    lines.push(`  1. ${titleObj.amtLabel} : 금${fmt(totalAmt)}원(금${amtKr}원)`);
    lines.push(`  2. 일     시 : ${dateStr}`);
    lines.push(`  3. 장     소 : ${placeStr}`);
    if (titleObj.참석label && titleObj.참석desc) {
      lines.push(`  4. ${titleObj.참석label} : ${people}명(${titleObj.참석desc})`);
      lines.push(`  5. 지출방법 : ${tmpl.지출방법}`);
      lines.push(`  6. ${tmpl.예산label} : ${tmpl.예산과목}.  끝.`);
    } else {
      lines.push(`  4. 지출방법 : ${tmpl.지출방법}`);
      lines.push(`  5. ${tmpl.예산label} : ${tmpl.예산과목}.  끝.`);
    }

    return { title, body: lines.join("\n") };
  };

  // Save 사용목적 to row.extra when a document is generated
  const saveDocPurpose = (docTitle, modal) => {
    const ids = modal.mode === "combined" ? modal.rows.map(r=>r.id) : [modal.row.id];
    const updated = rows.map(r => ids.includes(r.id) ? {...r, extra:{...r.extra, "사용목적": docTitle, "사용내역": docTitle}} : r);
    persist(updated);
  };

  const openDocModal = (row) => {
    const tmpl = DOC_TEMPLATES[row.catId];
    if (!tmpl) return;
    if (tmpl.titles.length === 1) {
      const doc = generateDoc(row, tmpl, tmpl.titles[0], "");
      const modal = { row, rows:[row], catId: row.catId, step: "preview", titleId: tmpl.titles[0].id, nValue: "", docText: doc.body, docTitle: doc.title, mode:"single" };
      setDocModal(modal);
      saveDocPurpose(doc.title, modal);
    } else {
      setDocModal({ row, rows:[row], catId: row.catId, step: "select", titleId: "", nValue: "", mode:"single" });
    }
  };

  const openDocModalMulti = (selRows, catId) => {
    const tmpl = DOC_TEMPLATES[catId];
    if (!tmpl || selRows.length < 2) return;
    setDocModal({ row: selRows[0], rows: selRows, catId, step: "select", titleId: "", nValue: "", mode:"combined" });
  };

  const selectDocTitle = (titleId) => {
    if (!docModal) return;
    const tmpl = DOC_TEMPLATES[docModal.catId];
    const titleObj = tmpl.titles.find(t => t.id === titleId);
    if (titleObj?.hasN && !docModal.nValue) {
      setDocModal({ ...docModal, titleId, step: "inputN" });
    } else {
      const doc = docModal.mode==="combined" && docModal.rows?.length>=2
        ? generateCombinedDoc(docModal.rows, tmpl, titleObj, docModal.nValue)
        : generateDoc(docModal.row, tmpl, titleObj, docModal.nValue);
      setDocModal({ ...docModal, titleId, step: "preview", docText: doc.body, docTitle: doc.title });
      saveDocPurpose(doc.title, docModal);
    }
  };

  const confirmN = () => {
    if (!docModal) return;
    const tmpl = DOC_TEMPLATES[docModal.catId];
    const titleObj = tmpl.titles.find(t => t.id === docModal.titleId);
    const doc = docModal.mode==="combined" && docModal.rows?.length>=2
      ? generateCombinedDoc(docModal.rows, tmpl, titleObj, docModal.nValue)
      : generateDoc(docModal.row, tmpl, titleObj, docModal.nValue);
    setDocModal({ ...docModal, step: "preview", docText: doc.body, docTitle: doc.title });
    saveDocPurpose(doc.title, docModal);
  };

  const copyDoc = () => {
    if (!docModal?.docText) return;
    navigator.clipboard.writeText(docModal.docText).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  };

  const jsonRef = useRef(null);
  const saveToFile = () => {
    const data = JSON.stringify({rows, budgets, catNames, customDocTmpls, preset: presetName, exportedAt: new Date().toISOString()}, null, 2);
    const blob = new Blob([data], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url;
    a.download = `지출관리_백업_${presetName}_${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(url);
    notify("파일 저장 완료!");
  };
  const loadFromFile = (file) => {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if(data.rows) {
          // Warn if backup is from a different preset
          if(data.preset && data.preset !== presetName) {
            if(!confirm(`이 백업은 "${data.preset}" 프리셋의 데이터입니다.\n현재 프리셋은 "${presetName}"입니다.\n계속 불러오시겠습니까?`)) return;
          }
          const merged=[...rows]; const keys=new Set(rows.map(r=>`${r.date}|${r.amount}|${r.place}`));
          let added=0;
          data.rows.forEach(r=>{if(!keys.has(`${r.date}|${r.amount}|${r.place}`)){merged.push(r);added++;}});
          persist(merged,{...budgets,...(data.budgets||{})},{...catNames,...(data.catNames||{})},{...customDocTmpls,...(data.customDocTmpls||{})});
          notify(`불러오기 완료! (${added}건 추가, 중복 ${data.rows.length-added}건 제외)`);
        }
      } catch { notify("파일 형식 오류","err"); }
    };
    reader.readAsText(file);
  };

  const notify = (msg, type="ok") => { setToast({msg,type}); setTimeout(()=>setToast(null),2800); };

  // 페이지 이탈 시 백업 확인
  const [showExitBackup, setShowExitBackup] = useState(false);
  useEffect(() => {
    if (!presetName || !rows.length) return;
    const handler = (e) => {
      e.preventDefault();
      e.returnValue = "";
      setShowExitBackup(true);
    };
    window.addEventListener("beforeunload", handler);
    return () => window.removeEventListener("beforeunload", handler);
  }, [presetName, rows.length]);

  // 페이지 포커스 복귀 시 백업 배너 표시 (beforeunload 취소 후 돌아왔을 때)
  useEffect(() => {
    const handler = () => {
      if (showExitBackup) {
        // 사용자가 "이 페이지에 머무르기"를 선택한 경우
        // 잠시 후 배너 자동 숨김
        setTimeout(() => setShowExitBackup(false), 15000);
      }
    };
    window.addEventListener("focus", handler);
    return () => window.removeEventListener("focus", handler);
  }, [showExitBackup]);

  useEffect(() => {
    if (!presetName) { setLoading(false); return; }
    const d = loadData(presetName);
    setRows(d.rows||[]);
    const mb = migrateBudgets(d.budgets||{});
    const yr = String(new Date().getFullYear());
    setBudgets({...mb, [yr]: {...DEFAULT_BUDGETS, ...(mb[yr]||{})}});
    setCatNames(d.catNames||{});
    setCustomDocTmpls(d.customDocTmpls||{});
    setLoading(false);
  }, []);

  const persist = useCallback((r, b, cn, dt) => {
    if (!presetName) return;
    const newRows = r !== undefined ? r : rows;
    const newBudgets = b !== undefined ? b : budgets;
    const newCatNames = cn !== undefined ? cn : catNames;
    const newDocTmpls = dt !== undefined ? dt : customDocTmpls;
    if(r !== undefined) setRows(newRows);
    if(b !== undefined) setBudgets(newBudgets);
    if(cn !== undefined) setCatNames(newCatNames);
    if(dt !== undefined) setCustomDocTmpls(newDocTmpls);
    saveData(presetName, {rows:newRows, budgets:newBudgets, catNames:newCatNames, customDocTmpls:newDocTmpls});
  }, [rows, budgets, catNames, customDocTmpls, presetName]);

  // Helper: get category display name (override or default)
  const getCatName = useCallback((catId) => {
    if (catNames[catId]) return catNames[catId];
    return ALL_CATS.find(c=>c.id===catId)?.name || catId;
  }, [catNames, ALL_CATS]);

  // 카테고리 추가/삭제 (프리셋의 카테고리 구조 수정)
  const addCategory = (tabName, catName, budget) => {
    const prefix = tabName === "일반지출" ? "g" : "d";
    const existing = CATEGORIES[tabName] || [];
    const maxNum = existing.reduce((m,c) => {
      const n = parseInt(c.id.replace(prefix,"")) || 0;
      return n > m ? n : m;
    }, 0);
    const newId = prefix + (maxNum + 1);
    const newCat = {
      id: newId, name: catName.trim(), budget: parseAmt(budget),
      fields: ["월","일자","금액","장소","사용내역"],
      dateField: "일자", amountField: "금액", placeField: "장소"
    };
    // 프리셋 업데이트 (깊은 복사로 원본 보호)
    const ap = getAllPresets();
    const preset = ap[presetName];
    if (!preset) return;
    const updatedPreset = {
      ...preset,
      categories: {
        ...preset.categories,
        [tabName]: [...(preset.categories[tabName]||[]), newCat]
      }
    };
    const custom = loadCustomPresets();
    custom[presetName] = updatedPreset;
    saveCustomPresets(custom);
    setAllPresets({...allPresets, [presetName]: updatedPreset});
    // 예산 업데이트
    const yrB = {...(budgets[budgetYear]||{}), [newId]: parseAmt(budget)};
    const newB = {...budgets, [budgetYear]: yrB};
    persist(undefined, newB);
    notify(`${catName} 카테고리 추가 완료`);
  };

  const removeCategory = (tabName, catId) => {
    const ap = getAllPresets();
    const preset = ap[presetName];
    if (!preset) return;
    // 해당 카테고리에 분류된 데이터가 있는지 확인
    const hasData = rows.some(r => r.catId === catId);
    if (hasData && !confirm(`이 카테고리에 분류된 데이터가 있습니다.\n삭제하면 해당 항목은 미분류로 변경됩니다.\n계속하시겠습니까?`)) return;
    const updatedPreset = {
      ...preset,
      categories: {

      }
    };

    custom[presetName] = updatedPreset;

    setAllPresets({...allPresets, [presetName]: updatedPreset});
    // 분류된 행들을 미분류로 변경
    if (hasData) {
      const updated = rows.map(r => r.catId === catId ? {...r, tab:"", catId:""} : r);
      persist(updated);
    }
    notify(`카테고리 삭제됨`);
  };

  const updateCatName = (catId, newName) => {
    const trimmed = newName.trim();
    const newCN = {...catNames};
    if (trimmed && trimmed !== (ALL_CATS.find(c=>c.id===catId)?.name||"")) {
      newCN[catId] = trimmed;
    } else {
      delete newCN[catId]; // reset to default
    }
    persist(undefined, undefined, newCN);
  };

  const processData = useCallback((data) => {
    const p = data.filter(r=>r["승인일시"]&&r["금액"]&&r["가맹점명"]).map(r=>({
      id:uid(), date:r["승인일시"]||"", amount:parseAmt(r["금액"]),
      place:(r["가맹점명"]||"").trim(), tab:"", catId:"", extra:{}, addedAt:new Date().toISOString(),
    }));
    const keys = new Set(rows.map(r=>`${r.date}|${r.amount}|${r.place}`));
    const uniq = p.filter(r=>!keys.has(`${r.date}|${r.amount}|${r.place}`));
    setNewRows(uniq); setView("classify");
    notify(uniq.length<p.length ? `${uniq.length}건 추가 (중복 ${p.length-uniq.length}건 제외)` : `${uniq.length}건 로드`);
  }, [rows]);

  const handleFile = useCallback((file) => {
    if (!file) return;
    const ext = file.name.split(".").pop().toLowerCase();
    if (ext === "csv") {
      Papa.parse(file, { header:true, skipEmptyLines:true, complete:(res) => processData(res.data) });
    } else if (ext === "xlsx" || ext === "xls") {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const wb = XLSX.read(e.target.result, {type:"array"});
          const ws = wb.Sheets[wb.SheetNames[0]];
          const data = XLSX.utils.sheet_to_json(ws, {defval:""});
          processData(data);
        } catch { notify("엑셀 파싱 오류","err"); }
      };
      reader.readAsArrayBuffer(file);
    } else {
      notify("CSV 또는 엑셀 파일만 지원됩니다","err");
    }
  }, [rows, processData]);

  const mergeNew = () => { persist([...rows,...newRows]); setNewRows([]); setView("history"); notify(`${newRows.length}건 저장 완료`); };

  const upd = (id, u, isNew) => {
    if (isNew) setNewRows(p=>p.map(r=>r.id===id?{...r,...u}:r));
    else persist(rows.map(r=>r.id===id?{...r,...u}:r));
  };
  const setCat = (id, cid, isNew) => {
    const c = ALL_CATS.find(x=>x.id===cid);
    upd(id, c ? {tab:c.tab,catId:c.id} : {tab:"",catId:""}, isNew);
  };
  const del = (id) => { persist(rows.filter(r=>r.id!==id)); notify("삭제됨"); };
  const batchApply = (isNew) => {
    if(!batchCat||!selected.size) return;

    else persist(rows.map(r=>selected.has(r.id)?{...r,tab:c.tab,catId:c.id}:r));

      const dr=[];
      for(let i=0;i<mx;i++){const rw=[];cats.forEach((c,ci)=>{const its=tr.filter(r=>r.catId===c.id),it=its[i];
        c.fields.forEach(f=>{if(!it){rw.push("");return;}if(f===c.dateField)rw.push(it.date);else if(f===c.amountField||f==="금액"||f==="지출")rw.push(it.amount);

      };
      setCats({...cats, [tab]: [...existing, newCat]});
      setAddForm({name:"", budget:0});
    };

    const removeCat = (tab, idx) => {
      const updated = [...cats[tab]];
      updated.splice(idx, 1);
      const prefix = tab === "일반지출" ? "g" : "d";
      updated.forEach((c, i) => { c.id = prefix + (i + 1); });
      setCats({...cats, [tab]: updated});
    };

    const copyFromPreset = (srcName) => {
      const ap = getAllPresets();

      if(!src) return;

      const copiedCats = {};

      // 공문 템플릿도 복사
      if(src.docTemplates) {
        const dt = {};

        });
        setCopiedDocTmpls(dt);
      }

      if(total === 0) { alert("최소 1개의 카테고리를 추가하세요."); return; }

          }} style={{padding:"10px 20px",background:"#6366f1",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700,fontFamily:"inherit"}}>다음</button>
        </div>

              fontFamily:"inherit",color:"var(--gray-500)",display:"flex",alignItems:"center",gap:10,transition:"all var(--transition-fast)"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor="var(--primary-light)";e.currentTarget.style.color="var(--primary)";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--gray-300)";e.currentTarget.style.color="var(--gray-500)";}}>

            style={{flex:1,padding:"8px 10px",border:"1.5px solid #e2e8f0",borderRadius:6,fontSize:12,fontFamily:"inherit"}}
            onKeyDown={e=>{if(e.key==="Enter")addCat();}}/>

            return row.extra?.[f] || "";

                      })()}
                    </div>

                    {/* Editable spreadsheet table */}
                    {(()=>{
                      // 묶인 건 판별: 같은 사용목적을 가진 행들을 그룹으로
                      const groupMap = {};
                      catRows.forEach(r => {
                        const purpose = r.extra?.["사용목적"];
                        if (purpose) {
                          if (!groupMap[purpose]) groupMap[purpose] = [];
                          groupMap[purpose].push(r.id);
                        }
                      });
                      // 2건 이상인 그룹만 묶음 표시
                      const bundledIds = new Set();
                      const bundleColors = ["#6366f1","#0ea5e9","#8b5cf6","#ec4899","#f59e0b","#10b981"];
                      const bundleColorMap = {};
                      let colorIdx = 0;
                      Object.entries(groupMap).forEach(([purpose, ids]) => {
                        if (ids.length >= 2) {
                          const color = bundleColors[colorIdx % bundleColors.length];
                          colorIdx++;
                          ids.forEach(id => { bundledIds.add(id); bundleColorMap[id] = color; });
                        }
                      });

                      return <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,tableLayout:"fixed"}}>
                        <colgroup>
                          <col style={{width:34}}/>
                          <col style={{width:36}}/>
                          {cat.fields.map((f,fi)=>{
                            const isAmt = f==="금액"||f==="지출"||f===cat.amountField;
                            const isDate = f===cat.dateField||f==="사용일자";
                            const isPlace = f==="장소"||f===cat.placeField;
                            const isDetail = f.includes("내역")||f.includes("목적");
                            const isMon = f==="월";
                            const isEtc = f==="구분(이호조)"||f==="인원";
                            const w = isMon?"36px":isAmt?"90px":isDate?"135px":isPlace?"110px":isDetail?"auto":isEtc?"70px":"80px";
                            return <col key={fi} style={{width:w}}/>;
                          })}
                          <col style={{width:50}}/>
                          <col style={{width:110}}/>
                          <col style={{width:32}}/>
                        </colgroup>
                        <thead>
                          <tr>
                            <th style={{...S.pvTh,width:34,textAlign:"center"}}>
                              <input type="checkbox" checked={catRows.length>0&&catRows.every(r=>docSelected.has(r.id))}
                                onChange={()=>{const ns=new Set(docSelected);const allSel=catRows.every(r=>ns.has(r.id));catRows.forEach(r=>{allSel?ns.delete(r.id):ns.add(r.id);});setDocSelected(ns);}}/>
                            </th>
                            <th style={{...S.pvTh,width:36,textAlign:"center"}}>#</th>
                            {cat.fields.map((f,fi)=>(
                              <th key={fi} style={{...S.pvTh,...(f==="금액"||f==="지출"||f===cat.amountField?{textAlign:"right"}:{})}}>{f}</th>
                            ))}
                            <th style={{...S.pvTh,width:50}}/>
                            <th style={{...S.pvTh,width:110,textAlign:"center"}}>진행상태</th>
                            <th style={{...S.pvTh,width:32}}/>
                          </tr>
                        </thead>
                        <tbody>
                          {catRows.map((row,idx)=>{
                            const isBundled = bundledIds.has(row.id);
                            const bColor = bundleColorMap[row.id];
                            // 묶음 그룹에서 첫 번째/마지막 행 판별
                            const purpose = row.extra?.["사용목적"]||"";
                            const groupIds = groupMap[purpose]||[];
                            const isGroupFirst = isBundled && groupIds[0]===row.id;
                            const isGroupLast = isBundled && groupIds[groupIds.length-1]===row.id;

                            return <tr key={row.id} style={{
                              borderBottom:isGroupLast?`2px solid ${bColor}33`:isBundled?"1px dashed "+bColor+"44":"1px solid #f0f1f3",
                              ...(isGroupFirst?{borderTop:`2px solid ${bColor}33`}:{}),
                              background:docSelected.has(row.id)?"#eef2ff":isBundled?(bColor+"08"):(idx%2===0?"#fff":"#fafafc"),
                              transition:"background .1s"
                            }}
                              onMouseEnter={e=>{if(!docSelected.has(row.id))e.currentTarget.style.background=isBundled?(bColor+"14"):"#f5f6ff";}}

                              <td style={{...S.pvTd,textAlign:"center",
                                borderLeft:isBundled?`3px solid ${bColor}`:"3px solid transparent"}}>
                                <input type="checkbox" checked={docSelected.has(row.id)} onChange={()=>{const ns=new Set(docSelected);ns.has(row.id)?ns.delete(row.id):ns.add(row.id);setDocSelected(ns);}}/>
                              </td>
                              <td style={{...S.pvTd,textAlign:"center",color:isBundled?bColor:"#b0b8c4",fontSize:11,fontWeight:700}}>{idx+1}</td>
                              {cat.fields.map((f,fi)=>{
                                const val = cellVal(row,f,cat);
                                const isAmt = f==="금액"||f==="지출"||f===cat.amountField;
                                const isMon = f==="월";
                                const isDetail = f.includes("내역")||f.includes("목적");
                                const editable = !isMon;

                                if(isEditing(row.id,f) && editable) {
                                  return <td key={fi} style={{...S.pvTd,padding:"4px 6px"}}>
                                    <input autoFocus
                                      defaultValue={isAmt ? String(row.amount) : val}
                                      style={{width:"100%",padding:"6px 8px",border:"2px solid "+accent,borderRadius:5,fontSize:13,fontFamily:"inherit",
                                        background:"#fff",color:"#1e293b",textAlign:isAmt?"right":"left"}}
                                      onBlur={e=>{setCellVal(row,f,cat,e.target.value);setEditCell(null);}}
                                      onKeyDown={e=>{if(e.key==="Enter"){setCellVal(row,f,cat,e.target.value);setEditCell(null);}if(e.key==="Escape")setEditCell(null);}}
                                    />
                                  </td>;
                                }

                                return (
                                  <td key={fi}
                                    onClick={()=>{if(editable)setEditCell({rowId:row.id,field:f});}}
                                    style={{
                                      ...S.pvTd,
                                      cursor:editable?"text":"default",
                                      ...(isAmt?{textAlign:"right",fontWeight:700,fontVariantNumeric:"tabular-nums",color:"#0f172a"}:{}),
                                      ...(f==="장소"||f===cat.placeField?{fontWeight:600,overflow:"hidden",textOverflow:"ellipsis"}:{}),
                                      ...(isDetail?{overflow:"hidden",textOverflow:"ellipsis"}:{}),
                                      ...(!val&&!isAmt&&!isMon?{color:"#d1d5db"}:{}),
                                      ...(editable?{borderBottom:"1px dashed #d1d5db22"}:{}),
                                    }}
                                    title={editable?(val||"클릭하여 편집"):""}>
                                    {isAmt ? <>{fmt(row.amount)}<span style={{fontWeight:400,color:"#94a3b8",fontSize:11}}>원</span></> : (isMon ? (val?val+"월":"") : (val || "—"))}
                                  </td>
                                );
                              })}
                              <td style={{...S.pvTd,whiteSpace:"nowrap"}}>
                                {DOC_TEMPLATES[cat.id] && (()=>{
                                  const missing = [];
                                  if(!row.extra?.["인원"]) missing.push("인원");
                                  if(!row.extra?.["사용목적"]) missing.push("사용목적");
                                  return <>
                                    {missing.length>0 && <span title={`미입력: ${missing.join(", ")}`} style={{color:"#f59e0b",fontSize:12,cursor:"help",marginRight:2}}>⚠</span>}
                                    <button onClick={()=>openDocModal(row)} style={{...S.tiny,color:"#6366f1",fontSize:14}} title="공문 생성">📄</button>
                                  </>;
                                })()}
                              </td>
                              <td style={{...S.pvTd,textAlign:"center",whiteSpace:"nowrap"}}>

                                  const st = row.extra?.["진행상태"] || "";
                                  const steps = [{key:"공문",label:"공문"},{key:"결재",label:"e호조"}];
                                  return <div style={{display:"flex",gap:4,justifyContent:"center"}}>
                                    {steps.map(s=>{
                                      const done = st.includes(s.key);
                                      return <button key={s.key} onClick={()=>{
                                        let next;
                                        if(done) next = st.replace(s.key,"").replace(/,+/g,",").replace(/^,|,$/g,"");
                                        else next = st ? st+","+s.key : s.key;
                                        persist(rows.map(r=>r.id===row.id?{...r,extra:{...r.extra,"진행상태":next}}:r));
                                      }} style={{padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700,border:"1px solid",cursor:"pointer",fontFamily:"inherit",transition:"all .1s",
                                        background:done?"#f0fdf4":"#fff",color:done?"#16a34a":"#94a3b8",borderColor:done?"#86efac":"#e2e8f0"
                                      }}>{done?"✓ ":""}{s.label}</button>;
                                    })}
                                  </div>;
                                })()}
                              </td>
                              <td style={{...S.pvTd,textAlign:"center"}}>
                                <button onClick={()=>{if(confirm(`"${row.place}" (${fmt(row.amount)}원) 내역을 삭제하시겠습니까?`))del(row.id);}} style={{...S.tiny,color:"#ef4444",opacity:.4,fontSize:11}} title="삭제"
                                  onMouseEnter={e=>e.currentTarget.style.opacity="1"} onMouseLeave={e=>e.currentTarget.style.opacity=".4"}>✕</button>
                              </td>
                            </tr>;
                          })}
                        </tbody>
                        <tfoot>
                          <tr style={{background:lightBg}}>
                            <td style={S.pvTd}/>
                            <td style={{...S.pvTd,textAlign:"center",fontWeight:700,color:accent}}>합계</td>
                            {cat.fields.map((f,fi)=>{
                              const isAmt = f==="금액"||f==="지출"||f===cat.amountField;
                              return <td key={fi} style={{...S.pvTd,...(isAmt?{textAlign:"right",fontWeight:800,fontSize:14,color:accent}:{})}}>{isAmt?fmt(catTotal)+"원":""}</td>;
                            })}
                            <td style={S.pvTd}/>
                            <td style={S.pvTd}/>
                            <td style={S.pvTd}/>
                          </tr>
                        </tfoot>
                      </table>
                    </div>;
                    })()}
                  </div>
                );
              })}

              {/* Total summary bar */}
              <div style={{display:"flex",justifyContent:"flex-end",padding:"10px 0"}}>
                <div style={{background:lightBg,padding:"16px 28px",borderRadius:"var(--radius-lg)",textAlign:"right",border:"1px solid "+accent+"22",boxShadow:"0 2px 8px "+accent+"10"}}>
                  <div style={{fontSize:12,fontWeight:600,color:accent,marginBottom:4,letterSpacing:"0.3px"}}>{previewTab} 총계</div>
                  <div style={{fontSize:24,fontWeight:900,color:accent,fontVariantNumeric:"tabular-nums",fontFamily:"var(--mono)",letterSpacing:"-0.5px"}}>{fmt(tabTotal)}<span style={{fontSize:14,fontWeight:600,marginLeft:2}}>원</span></div>
                </div>
              </div>
            </>)}
          </div>;
        })()}

        {/* BUDGET MANAGEMENT */}
        {view==="budget"&&<div style={{animation:"fadeUp var(--transition-slow) ease"}}>
          {/* 연도 선택 */}
          <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center"}}>
            <span style={{fontSize:12,fontWeight:600,color:"var(--gray-500)"}}>연도</span>
            <div style={{display:"flex",gap:0,borderRadius:"var(--radius-sm)",overflow:"hidden",border:"1px solid var(--gray-200)",boxShadow:"var(--shadow-sm)"}}>
              {(()=>{
                const yr = parseInt(budgetYear);
                return [yr-1,yr,yr+1].map(y=>(
                  <button key={y} onClick={()=>setBudgetYear(String(y))} style={{padding:"6px 16px",border:"none",fontSize:12,fontWeight:budgetYear===String(y)?700:500,fontFamily:"inherit",
                    background:budgetYear===String(y)?"var(--gray-900)":"#fff",color:budgetYear===String(y)?"#fff":"var(--gray-500)",transition:"all var(--transition-fast)"}}>{y}년</button>
                ));
              })()}
            </div>
            <button onClick={()=>{
              const prev = String(parseInt(budgetYear)-1);
              if(budgets[prev] && confirm(`${prev}년 예산을 ${budgetYear}년으로 복사하시겠습니까?`)){
                const newB = {...budgets, [budgetYear]: {...budgets[prev], ...(budgets[budgetYear]||{})}};
                persist(undefined, newB);
                notify(`${prev}년 예산 복사 완료`);
              } else if(!budgets[prev]) { notify("이전 연도 예산이 없습니다","err"); }
            }} style={{...S.sec2,fontSize:11,padding:"5px 12px"}}>← 전년도 예산 복사</button>
          </div>
          {["일반지출","일상경비"].map(tabName=>{
            const cats = CATEGORIES[tabName]||[];
            const isG = tabName==="일반지출";
            const accent = isG ? "#3b82f6" : "#10b981";
            const tabTotal = cats.reduce((s,c)=>s+getBudget(c.id,budgetYear),0);
            const tabSpent = cats.reduce((s,c)=>s+rows.filter(r=>r.catId===c.id).reduce((ss,r)=>ss+r.amount,0),0);
            return <div key={tabName} style={{marginBottom:24}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{width:10,height:10,borderRadius:"50%",background:accent}}/>
                  <h2 style={{fontSize:16,fontWeight:800,color:"var(--gray-800)"}}>{tabName}</h2>
                </div>
                <div style={{fontSize:12,color:"var(--gray-500)",background:"var(--gray-50)",padding:"6px 14px",borderRadius:"var(--radius-sm)",border:"1px solid var(--gray-100)"}}>
                  예산 <strong style={{color:"var(--gray-800)"}}>{fmt(tabTotal)}원</strong> · 집행 <strong style={{color:accent}}>{fmt(tabSpent)}원</strong>
                </div>
              </div>
              <div style={{borderRadius:"var(--radius-md)",border:"1px solid var(--gray-200)",overflow:"hidden",background:"#fff",boxShadow:"var(--shadow-sm)"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead><tr style={{background:"#f8f9fb"}}>
                    <th style={S.pvTh}>카테고리</th>

                    <th style={{...S.pvTh,textAlign:"right",minWidth:110}}>집행액</th>

                    <th style={{...S.pvTh,width:32}}/>
                  </tr></thead>
                  <tbody>
                    {cats.map((c,idx)=>{
                      const bg=getBudget(c.id,budgetYear);
                      const spent=rows.filter(r=>r.catId===c.id).reduce((s,r)=>s+r.amount,0);
                      const remain=bg-spent;
                      const pct=bg>0?Math.min((spent/bg)*100,100):0;
                      const over=spent>bg&&bg>0;
                      const cnt=rows.filter(r=>r.catId===c.id).length;
                      return <tr key={c.id} style={{borderBottom:"1px solid #f0f1f3",background:idx%2===0?"#fff":"#fafafc"}}>
                        <td style={{...S.pvTd,fontWeight:600}}>
                          {editCatName===c.id ? (
                            <input autoFocus defaultValue={getCatName(c.id)} style={{width:"100%",padding:"4px 8px",border:"2px solid "+accent,borderRadius:5,fontSize:13,fontWeight:600,fontFamily:"inherit"}}
                              onBlur={e=>{updateCatName(c.id,e.target.value);setEditCatName(null);}}
                              onKeyDown={e=>{if(e.key==="Enter"){updateCatName(c.id,e.target.value);setEditCatName(null);}if(e.key==="Escape")setEditCatName(null);}}/>
                          ) : (
                            <span onClick={()=>setEditCatName(c.id)} style={{cursor:"pointer",borderBottom:"1px dashed #cbd5e1"}} title="클릭하여 카테고리명 수정">
                              {getCatName(c.id)}
                            </span>
                          )}
                        </td>
                        <td style={{...S.pvTd,textAlign:"right"}}>
                          {editBudget===c.id ? (
                            <input autoFocus defaultValue={bg} style={{width:130,padding:"4px 8px",border:"2px solid "+accent,borderRadius:5,fontSize:13,fontWeight:700,fontFamily:"inherit",textAlign:"right"}}
                              onBlur={e=>{updateBudget(c.id,e.target.value);setEditBudget(null);}}
                              onKeyDown={e=>{if(e.key==="Enter"){updateBudget(c.id,e.target.value);setEditBudget(null);}if(e.key==="Escape")setEditBudget(null);}}/>

                            {bg>0?pct.toFixed(1)+"%":"—"}
                          </span>
                        </td>
                        <td style={{...S.pvTd,textAlign:"center",fontSize:11,color:"#94a3b8"}}>{cnt}</td>

                            onMouseEnter={e=>e.currentTarget.style.opacity="1"} onMouseLeave={e=>e.currentTarget.style.opacity=".4"}>✕</button>
                        </td>
                      </tr>;
                    })}
                  </tbody>
                  <tfoot><tr style={{background:isG?"#eff6ff":"#ecfdf5"}}>
                    <td style={{...S.pvTd,fontWeight:800}}>합계</td>
                    <td style={{...S.pvTd,textAlign:"right",fontWeight:800,fontFamily:"var(--mono)"}}>{fmt(tabTotal)}원</td>
                    <td style={{...S.pvTd,textAlign:"right",fontWeight:800,fontFamily:"var(--mono)",color:accent}}>{fmt(tabSpent)}원</td>

                    <td style={S.pvTd}/>

                </table>

              <div style={{display:"flex",gap:0,borderRadius:"var(--radius-sm)",overflow:"hidden",border:"1px solid var(--gray-200)"}}>
                {["일반지출","일상경비"].map(t=>(
                  <button key={t} onClick={()=>setAddCatTab(t)} style={{padding:"6px 14px",border:"none",fontSize:11,fontWeight:addCatTab===t?700:500,fontFamily:"inherit",
                    background:addCatTab===t?(t==="일반지출"?"#3b82f6":"#10b981"):"#fff",color:addCatTab===t?"#fff":"var(--gray-500)"}}>{t}</button>

                <p style={MS.p}>월별 지출 내역을 정보공개용 서식으로 내보냅니다.</p>
                <div style={MS.step}><span style={MS.num}>1</span><div>상단에서 <strong>연도와 월</strong>을 선택</div></div>
                <div style={MS.step}><span style={MS.num}>2</span><div><strong>집행내역</strong>(일반지출) / <strong>시책추진업무추진비</strong> 탭 전환</div></div>
                <div style={MS.step}><span style={MS.num}>3</span><div>사용목적 입력란에서 <strong>직접 입력</strong> (공문 생성 시 자동 입력됨)</div></div>
                <div style={MS.step}><span style={MS.num}>4</span><div><strong>"📥 정보공개 엑셀 다운로드"</strong> 클릭</div></div>
              </div>

              {/* 8. 백업 */}
              <div style={MS.sec}>
                <h2 style={MS.h2}><span>💾</span> 8. 데이터 백업 (중요!)</h2>
                <div style={MS.warn}>⚠️ <strong>주의:</strong> 모든 데이터는 브라우저에 저장됩니다. 브라우저 캐시 삭제, 브라우저 재설치, PC 포맷 시 데이터가 삭제됩니다!</div>
                <h3 style={MS.h3}>백업하기</h3>
                <p style={MS.p}>☰ 메뉴 → <strong>💾 파일 백업</strong> → JSON 파일이 다운로드됩니다.</p>
                <h3 style={MS.h3}>복원하기</h3>
                <p style={MS.p}>☰ 메뉴 → <strong>📂 백업 불러오기</strong> → 백업 파일 선택 → 자동으로 병합됩니다.</p>
                <div style={MS.tip}>💡 <strong>권장:</strong> 주 1회 파일 백업을 습관화하세요. 다른 PC로 옮길 때도 백업 파일을 사용합니다.</div>
                <h3 style={MS.h3}>데이터가 삭제되는 경우</h3>
                <div style={{fontSize:12,lineHeight:1.8,color:"var(--gray-600)"}}>
                  <div style={{display:"flex",gap:8,padding:"4px 0"}}><span style={{color:"#ef4444"}}>X</span> 브라우저 캐시/쿠키 삭제</div>
                  <div style={{display:"flex",gap:8,padding:"4px 0"}}><span style={{color:"#ef4444"}}>X</span> 시크릿(프라이빗) 모드에서 사용 후 창 닫기</div>
                  <div style={{display:"flex",gap:8,padding:"4px 0"}}><span style={{color:"#ef4444"}}>X</span> 브라우저 재설치 또는 PC 포맷</div>
                  <div style={{display:"flex",gap:8,padding:"4px 0"}}><span style={{color:"#ef4444"}}>X</span> 다른 브라우저/기기에서는 데이터가 별도</div>
                  <div style={{display:"flex",gap:8,padding:"4px 0"}}><span style={{color:"#16a34a"}}>O</span> 일반 탭 닫기, PC 재부팅 → 데이터 유지</div>
                  <div style={{display:"flex",gap:8,padding:"4px 0"}}><span style={{color:"#16a34a"}}>O</span> Vercel 재배포 → 데이터 유지</div>
                </div>
              </div>

              {/* 9. 기타 */}
              <div style={MS.sec}>
                <h2 style={MS.h2}><span>⚙️</span> 9. 기타 기능</h2>
                <h3 style={MS.h3}>엑셀 내보내기</h3>
                <p style={MS.p}>☰ 메뉴 → <strong>📥 엑셀 내보내기</strong> → 일반지출/일상경비 시트별 정리된 엑셀 파일 다운로드</p>
                <h3 style={MS.h3}>과(부서) 변경</h3>
                <p style={MS.p}>☰ 메뉴 → <strong>🔄 과 변경</strong> → 프리셋 선택 화면으로 (기존 데이터 보존)</p>
                <h3 style={MS.h3}>프리셋 삭제</h3>
                <p style={MS.p}>☰ 메뉴 → <strong>🗑️ 프리셋 삭제</strong> → 비밀번호 입력 후 해당 과의 모든 데이터 삭제</p>
                <h3 style={MS.h3}>초기화</h3>
                <p style={MS.p}>☰ 메뉴 → <strong>🗑️ 초기화</strong> → 현재 과의 사용내역/예산/공문설정 전부 삭제 (카테고리 구조는 유지)</p>
                <h3 style={MS.h3}>정렬</h3>
                <p style={MS.p}>사용내역 보기에서 <strong>"▼ 최신순 / ▲ 오래된순"</strong> 버튼으로 정렬 변경</p>
              </div>

              <div style={{textAlign:"center",padding:"20px 0",color:"var(--gray-300)",fontSize:12}}>
                지출관리 앱 v2.0 | 문의사항은 관리자에게 연락하세요
              </div>
            </>;
          })()}
        </div>}

        {/* DOC TEMPLATE SETUP */}
        {view==="docSetup"&&(()=>{
          const saveDocTmpl = (catId, tmpl) => {
            const newDT = {...customDocTmpls, [catId]: tmpl};
            persist(undefined, undefined, undefined, newDT);
          };
          const deleteDocTmpl = (catId) => {
            const newDT = {...customDocTmpls};
            delete newDT[catId];
            persist(undefined, undefined, undefined, newDT);
          };

          // 편집 폼 컴포넌트
          const TmplEditor = ({catId}) => {
            const builtIn = currentPreset?.docTemplates?.[catId];
            const custom = customDocTmpls[catId];
            const tmpl = custom || builtIn || null;
            const isBuiltIn = !!builtIn && !custom;

            const [editing, setEditing] = useState(!!tmpl);
            const [지출방법, set지출방법] = useState(tmpl?.지출방법||"");
            const [예산label, set예산label] = useState(tmpl?.예산label||"예산과목");
            const [예산과목, set예산과목] = useState(tmpl?.예산과목||"");
            const [titles, setTitles] = useState(tmpl?.titles||[]);
            const [addMode, setAddMode] = useState(false);
            const [editTitleIdx, setEditTitleIdx] = useState(null); // 수정 중인 제목 인덱스
            // 새 제목 폼
            const [newTitle, setNewTitle] = useState({label:"",intro:"",amtLabel:"집 행 액",참석label:"참 석 자",참석desc:"",hasN:false,noAttendee:false,isStaff:false});

            const addTitle = () => {
              if(!newTitle.label.trim()||!newTitle.intro.trim()) return;
              const t = {...newTitle, id:catId+"t"+(titles.length+1)};
              const newTitles = [...titles, t];
              setTitles(newTitles);
              setNewTitle({label:"",intro:"",amtLabel:"집 행 액",참석label:"참 석 자",참석desc:"",hasN:false,noAttendee:false,isStaff:false});
              setAddMode(false);
            };
            const removeTitle = (idx) => {
              setTitles(titles.filter((_,i)=>i!==idx));
            };
            const updateTitle = (idx, updated) => {
              setTitles(titles.map((t,i)=>i===idx?{...t,...updated}:t));
            };
            const saveTmpl = () => {
              if(!titles.length||!지출방법.trim()||!예산과목.trim()) { alert("제목, 지출방법, 예산과목을 모두 입력하세요."); return; }
              saveDocTmpl(catId, {titles, 지출방법, 예산label, 예산과목});
              notify(`${getCatName(catId)} 공문 템플릿 저장 완료!`);
              setDocEditCat(null);
            };

            if(!editing) return <div style={{textAlign:"center",padding:"20px 0"}}>
              <p style={{color:"var(--gray-400)",fontSize:13,marginBottom:12}}>공문 템플릿이 없습니다</p>
              <button onClick={()=>setEditing(true)} style={{...S.pri,fontSize:12,padding:"8px 18px"}}>+ 공문 템플릿 만들기</button>
            </div>;

            return <div style={{padding:"4px 0"}}>
              {isBuiltIn && <div style={{padding:"8px 14px",background:"var(--primary-bg)",borderRadius:"var(--radius-sm)",fontSize:12,color:"var(--primary)",marginBottom:14,border:"1px solid rgba(99,102,241,.15)"}}>
                기본 프리셋 템플릿입니다. 수정하면 커스텀으로 저장됩니다.
              </div>}

              {/* 공통 설정 */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
                <div>
                  <label style={{fontSize:11,fontWeight:700,color:"var(--gray-500)",marginBottom:4,display:"block"}}>지출방법</label>
                  <input value={지출방법} onChange={e=>set지출방법(e.target.value)} placeholder="예: NH농협카드(청구에 의한 계좌입금)"
                    style={{width:"100%",padding:"8px 12px",border:"1.5px solid var(--gray-200)",borderRadius:"var(--radius-sm)",fontSize:12,fontFamily:"inherit"}}/>
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:700,color:"var(--gray-500)",marginBottom:4,display:"block"}}>예산과목 라벨</label>
                  <input value={예산label} onChange={e=>set예산label(e.target.value)} placeholder="예산과목"
                    style={{width:"100%",padding:"8px 12px",border:"1.5px solid var(--gray-200)",borderRadius:"var(--radius-sm)",fontSize:12,fontFamily:"inherit"}}/>
                </div>
              </div>
              <div style={{marginBottom:16}}>
                <label style={{fontSize:11,fontWeight:700,color:"var(--gray-500)",marginBottom:4,display:"block"}}>예산과목 전체 경로</label>
                <input value={예산과목} onChange={e=>set예산과목(e.target.value)} placeholder="예: 의회사무처, 행정지원 기능 강화, ..."
                  style={{width:"100%",padding:"8px 12px",border:"1.5px solid var(--gray-200)",borderRadius:"var(--radius-sm)",fontSize:12,fontFamily:"inherit"}}/>
              </div>

              {/* 제목 목록 */}
              <div style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <label style={{fontSize:12,fontWeight:700,color:"var(--gray-700)"}}>공문 제목 ({titles.length}개)</label>
                  <button onClick={()=>setAddMode(true)} style={{fontSize:11,fontWeight:700,color:"var(--primary)",border:"none",background:"none",padding:"2px 4px"}}>+ 제목 추가</button>
                </div>
                {titles.map((t,i)=>(
                  <div key={t.id||i} style={{padding:"10px 14px",border:editTitleIdx===i?"2px solid var(--primary)":"1px solid var(--gray-200)",borderRadius:"var(--radius-sm)",marginBottom:6,background:editTitleIdx===i?"#fafaff":"var(--gray-50)"}}>
                    {editTitleIdx===i ? (
                      <div style={{display:"flex",flexDirection:"column",gap:8}}>
                        <div>
                          <label style={{fontSize:10,fontWeight:600,color:"var(--gray-500)"}}>제목</label>
                          <input value={t.label} onChange={e=>updateTitle(i,{label:e.target.value})}
                            style={{width:"100%",padding:"6px 10px",border:"1.5px solid var(--gray-200)",borderRadius:"var(--radius-sm)",fontSize:12,fontFamily:"inherit",marginTop:2}}/>
                        </div>
                        <div>
                          <label style={{fontSize:10,fontWeight:600,color:"var(--gray-500)"}}>본문 서두</label>
                          <textarea value={t.intro} onChange={e=>updateTitle(i,{intro:e.target.value})}
                            style={{width:"100%",padding:"6px 10px",border:"1.5px solid var(--gray-200)",borderRadius:"var(--radius-sm)",fontSize:12,fontFamily:"inherit",minHeight:50,resize:"vertical",marginTop:2}}/>
                        </div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                          <div>
                            <label style={{fontSize:10,fontWeight:600,color:"var(--gray-500)"}}>금액라벨</label>
                            <input value={t.amtLabel||""} onChange={e=>updateTitle(i,{amtLabel:e.target.value})}
                              style={{width:"100%",padding:"5px 8px",border:"1.5px solid var(--gray-200)",borderRadius:"var(--radius-sm)",fontSize:11,fontFamily:"inherit",marginTop:2}}/>
                          </div>
                          <div>
                            <label style={{fontSize:10,fontWeight:600,color:"var(--gray-500)"}}>참석자라벨</label>
                            <input value={t.참석label||""} onChange={e=>updateTitle(i,{참석label:e.target.value})}
                              style={{width:"100%",padding:"5px 8px",border:"1.5px solid var(--gray-200)",borderRadius:"var(--radius-sm)",fontSize:11,fontFamily:"inherit",marginTop:2}}/>
                          </div>
                          <div>
                            <label style={{fontSize:10,fontWeight:600,color:"var(--gray-500)"}}>참석자설명</label>
                            <input value={t.참석desc||""} onChange={e=>updateTitle(i,{참석desc:e.target.value})}
                              style={{width:"100%",padding:"5px 8px",border:"1.5px solid var(--gray-200)",borderRadius:"var(--radius-sm)",fontSize:11,fontFamily:"inherit",marginTop:2}}/>
                          </div>
                        </div>
                        <div style={{display:"flex",gap:12,alignItems:"center"}}>
                          <label style={{fontSize:10,display:"flex",alignItems:"center",gap:3,color:"var(--gray-600)"}}><input type="checkbox" checked={!!t.hasN} onChange={e=>updateTitle(i,{hasN:e.target.checked})}/> 회차(N)</label>
                          <label style={{fontSize:10,display:"flex",alignItems:"center",gap:3,color:"var(--gray-600)"}}><input type="checkbox" checked={!!t.noAttendee} onChange={e=>updateTitle(i,{noAttendee:e.target.checked})}/> 참석자생략</label>
                          <label style={{fontSize:10,display:"flex",alignItems:"center",gap:3,color:"var(--gray-600)"}}><input type="checkbox" checked={!!t.isStaff} onChange={e=>updateTitle(i,{isStaff:e.target.checked})}/> 직원용</label>
                          <div style={{flex:1}}/>
                          <button onClick={()=>setEditTitleIdx(null)} style={{...S.pri,fontSize:11,padding:"5px 14px"}}>수정 완료</button>
                        </div>
                      </div>
                    ) : (
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:600,color:"var(--gray-800)",marginBottom:3}}>{t.label}</div>
                          <div style={{fontSize:11,color:"var(--gray-400)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.intro}</div>
                          <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
                            {t.hasN&&<span style={{fontSize:10,padding:"1px 6px",background:"#fef3c7",color:"#92400e",borderRadius:3}}>회차입력</span>}
                            {t.noAttendee&&<span style={{fontSize:10,padding:"1px 6px",background:"var(--gray-100)",color:"var(--gray-500)",borderRadius:3}}>참석자 없음</span>}
                            {t.isStaff&&<span style={{fontSize:10,padding:"1px 6px",background:"#dbeafe",color:"#1d4ed8",borderRadius:3}}>직원용</span>}
                          </div>
                        </div>
                        <div style={{display:"flex",gap:4,flexShrink:0}}>
                          <button onClick={()=>setEditTitleIdx(i)} style={{...S.tiny,color:"var(--primary)",fontSize:11}}>수정</button>
                          <button onClick={()=>removeTitle(i)} style={{...S.tiny,color:"#ef4444",fontSize:11}}>삭제</button>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
                {!titles.length && <p style={{textAlign:"center",color:"var(--gray-300)",padding:10,fontSize:12}}>제목을 추가하세요</p>}
              </div>

              {/* 제목 추가 폼 */}
              {addMode && <div style={{padding:"14px 16px",border:"2px solid var(--primary)",borderRadius:"var(--radius-md)",marginBottom:14,background:"#fafaff"}}>
                <div style={{fontSize:12,fontWeight:700,color:"var(--primary)",marginBottom:10}}>새 공문 제목 추가</div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  <div>
                    <label style={{fontSize:11,fontWeight:600,color:"var(--gray-500)"}}>제목</label>
                    <input value={newTitle.label} onChange={e=>setNewTitle({...newTitle,label:e.target.value})} placeholder="예: 효율적인 의정활동을 위한 간담"
                      style={{width:"100%",padding:"8px 12px",border:"1.5px solid var(--gray-200)",borderRadius:"var(--radius-sm)",fontSize:12,fontFamily:"inherit",marginTop:3}}/>
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:600,color:"var(--gray-500)"}}>본문 서두 (intro)</label>
                    <textarea value={newTitle.intro} onChange={e=>setNewTitle({...newTitle,intro:e.target.value})} placeholder="예: 교육위원회 효율적인 의정활동 업무추진을 위하여..."
                      style={{width:"100%",padding:"8px 12px",border:"1.5px solid var(--gray-200)",borderRadius:"var(--radius-sm)",fontSize:12,fontFamily:"inherit",minHeight:60,resize:"vertical",marginTop:3}}/>
                    <div style={{fontSize:10,color:"var(--gray-400)",marginTop:2}}>{"{meal}"}=오찬/만찬 자동, N=회차 자동 치환</div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                    <div>
                      <label style={{fontSize:11,fontWeight:600,color:"var(--gray-500)"}}>금액 라벨</label>
                      <input value={newTitle.amtLabel} onChange={e=>setNewTitle({...newTitle,amtLabel:e.target.value})}
                        style={{width:"100%",padding:"6px 10px",border:"1.5px solid var(--gray-200)",borderRadius:"var(--radius-sm)",fontSize:12,fontFamily:"inherit",marginTop:3}}/>
                    </div>
                    <div>
                      <label style={{fontSize:11,fontWeight:600,color:"var(--gray-500)"}}>참석자 라벨</label>
                      <input value={newTitle.참석label} onChange={e=>setNewTitle({...newTitle,참석label:e.target.value})} placeholder="비워두면 참석자 생략"
                        style={{width:"100%",padding:"6px 10px",border:"1.5px solid var(--gray-200)",borderRadius:"var(--radius-sm)",fontSize:12,fontFamily:"inherit",marginTop:3}}/>
                    </div>
                    <div>
                      <label style={{fontSize:11,fontWeight:600,color:"var(--gray-500)"}}>참석자 설명</label>
                      <input value={newTitle.참석desc} onChange={e=>setNewTitle({...newTitle,참석desc:e.target.value})} placeholder="예: 교육위원 및 관계자"
                        style={{width:"100%",padding:"6px 10px",border:"1.5px solid var(--gray-200)",borderRadius:"var(--radius-sm)",fontSize:12,fontFamily:"inherit",marginTop:3}}/>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
                    <label style={{fontSize:11,display:"flex",alignItems:"center",gap:4,color:"var(--gray-600)",cursor:"pointer"}}>
                      <input type="checkbox" checked={newTitle.hasN} onChange={e=>setNewTitle({...newTitle,hasN:e.target.checked})}/> 회차(N) 입력
                    </label>
                    <label style={{fontSize:11,display:"flex",alignItems:"center",gap:4,color:"var(--gray-600)",cursor:"pointer"}}>
                      <input type="checkbox" checked={newTitle.noAttendee} onChange={e=>setNewTitle({...newTitle,noAttendee:e.target.checked})}/> 참석자 생략
                    </label>
                    <label style={{fontSize:11,display:"flex",alignItems:"center",gap:4,color:"var(--gray-600)",cursor:"pointer"}}>
                      <input type="checkbox" checked={newTitle.isStaff} onChange={e=>setNewTitle({...newTitle,isStaff:e.target.checked})}/> 직원 격려용
                    </label>
                  </div>
                  <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                    <button onClick={()=>setAddMode(false)} style={{...S.sec2,fontSize:11,padding:"6px 14px"}}>취소</button>
                    <button onClick={addTitle} style={{...S.pri,fontSize:11,padding:"6px 14px"}}>추가</button>
                  </div>
                </div>
              </div>}

              {/* 저장/삭제 */}
              <div style={{display:"flex",gap:8,justifyContent:"flex-end",paddingTop:8,borderTop:"1px solid var(--gray-100)"}}>
                {(custom||builtIn)&&<button onClick={()=>{if(confirm("이 카테고리의 커스텀 공문 템플릿을 삭제하시겠습니까?")){deleteDocTmpl(catId);setDocEditCat(null);notify("템플릿 삭제됨");}}} style={{...S.sec2,fontSize:12,padding:"8px 16px",color:"#ef4444",borderColor:"#fca5a5"}}>템플릿 삭제</button>}
                <button onClick={()=>setDocEditCat(null)} style={{...S.sec2,fontSize:12,padding:"8px 16px"}}>취소</button>
                <button onClick={saveTmpl} style={{...S.pri,fontSize:12,padding:"8px 20px"}}>저장</button>
              </div>
            </div>;
          };

          return <div style={{animation:"fadeUp var(--transition-slow) ease"}}>
            <p style={S.pd}>카테고리별 공문 템플릿을 추가하거나 수정하세요</p>

            {docEditCat ? (
              <div style={{background:"#fff",borderRadius:"var(--radius-lg)",border:"1px solid var(--gray-200)",padding:"20px 22px",boxShadow:"var(--shadow-sm)"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
                  <button onClick={()=>setDocEditCat(null)} style={{...S.sec2,fontSize:11,padding:"5px 10px"}}>← 목록</button>
                  <h2 style={{fontSize:16,fontWeight:800,color:"var(--gray-800)"}}>{getCatName(docEditCat)}</h2>
                  {DOC_TEMPLATES[docEditCat]&&<span style={{fontSize:10,padding:"2px 8px",background:"var(--success-bg)",color:"var(--success)",borderRadius:4,fontWeight:700}}>설정됨</span>}
                </div>
                <TmplEditor catId={docEditCat}/>
              </div>
            ) : (
              <div>
                {["일반지출","일상경비"].map(tabName=>{
                  const cats = CATEGORIES[tabName]||[];
                  const isG = tabName==="일반지출";
                  const accent = isG?"#3b82f6":"#10b981";
                  return <div key={tabName} style={{marginBottom:20}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                      <span style={{width:8,height:8,borderRadius:"50%",background:accent}}/>
                      <h2 style={{fontSize:15,fontWeight:800,color:"var(--gray-800)"}}>{tabName}</h2>
                    </div>
                    <div style={{borderRadius:"var(--radius-md)",border:"1px solid var(--gray-200)",overflow:"hidden",background:"#fff",boxShadow:"var(--shadow-sm)"}}>
                      {cats.map((c,idx)=>{
                        const hasTmpl = !!DOC_TEMPLATES[c.id];
                        const titleCount = DOC_TEMPLATES[c.id]?.titles?.length||0;
                        return <div key={c.id} onClick={()=>setDocEditCat(c.id)}
                          style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",
                            borderBottom:idx<cats.length-1?"1px solid var(--gray-100)":"none",cursor:"pointer",transition:"background var(--transition-fast)"}}
                          onMouseEnter={e=>e.currentTarget.style.background="var(--gray-50)"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                          <div style={{display:"flex",alignItems:"center",gap:10}}>
                            <span style={{fontSize:14}}>{hasTmpl?"📄":"📋"}</span>
                            <span style={{fontSize:13,fontWeight:600,color:"var(--gray-800)"}}>{getCatName(c.id)}</span>
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            {hasTmpl ? (
                              <span style={{fontSize:11,padding:"3px 10px",background:"var(--success-bg)",color:"var(--success)",borderRadius:20,fontWeight:700}}>{titleCount}개 제목</span>
                            ) : (
                              <span style={{fontSize:11,padding:"3px 10px",background:"var(--gray-100)",color:"var(--gray-400)",borderRadius:20,fontWeight:600}}>미설정</span>
                            )}
                            <span style={{color:"var(--gray-300)",fontSize:12}}>→</span>
                          </div>
                        </div>;
                      })}
                    </div>
                  </div>;
                })}
              </div>
            )}
          </div>;
        })()}

      </main>

      {/* Document Generation Modal */}
      {docModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.55)",backdropFilter:"blur(6px)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"fadeIn .2s"}}
          onClick={(e)=>{if(e.target===e.currentTarget)setDocModal(null);}}>
          <div style={{background:"#fff",borderRadius:"var(--radius-xl)",width:"100%",maxWidth:640,maxHeight:"90vh",overflow:"auto",boxShadow:"var(--shadow-xl)",animation:"scaleIn .25s ease"}}>
            {/* Modal header */}
            <div style={{padding:"20px 26px",borderBottom:"1px solid var(--gray-200)",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:"rgba(255,255,255,.95)",backdropFilter:"blur(12px)",borderRadius:"var(--radius-xl) var(--radius-xl) 0 0",zIndex:1}}>
              <h3 style={{fontSize:16,fontWeight:800,margin:0,display:"flex",alignItems:"center",gap:8}}>
                <span style={{width:28,height:28,borderRadius:8,background:"var(--primary-bg)",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:14}}>📄</span>
                공문 생성{docModal.mode==="combined"?` (${docModal.rows.length}건 합치기)`:""}
              </h3>
              <button onClick={()=>setDocModal(null)} style={{border:"none",background:"var(--gray-100)",fontSize:14,color:"var(--gray-400)",padding:"6px 8px",borderRadius:6,transition:"all var(--transition-fast)"}}
                onMouseEnter={e=>{e.currentTarget.style.background="var(--gray-200)";}} onMouseLeave={e=>{e.currentTarget.style.background="var(--gray-100)";}}>✕</button>
            </div>

            <div style={{padding:"20px 24px"}}>
              {/* Step: Select title */}
              {docModal.step==="select" && (()=>{
                const tmpl = DOC_TEMPLATES[docModal.catId];
                return <div>
                  <p style={{fontSize:13,color:"#64748b",marginBottom:14}}>공문 제목을 선택하세요</p>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {tmpl.titles.map(t=>(
                      <button key={t.id} onClick={()=>selectDocTitle(t.id)}
                        style={{padding:"14px 18px",border:"1px solid #e2e8f0",borderRadius:10,background:"#fff",textAlign:"left",fontSize:14,fontWeight:500,
                          fontFamily:"inherit",color:"#1e293b",transition:"all .12s"}}
                        onMouseEnter={e=>{e.currentTarget.style.borderColor="#6366f1";e.currentTarget.style.background="#f5f3ff";}}
                        onMouseLeave={e=>{e.currentTarget.style.borderColor="#e2e8f0";e.currentTarget.style.background="#fff";}}>
                        {t.label}
                      </button>
                    ))}
                  </div>
                </div>;
              })()}

              {/* Step: Input N (회차) */}
              {docModal.step==="inputN" && (
                <div>
                  <p style={{fontSize:13,color:"#64748b",marginBottom:10}}>임시회 회차를 입력하세요</p>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{fontSize:15,fontWeight:600}}>제</span>
                    <input autoFocus value={docModal.nValue||""} onChange={e=>setDocModal({...docModal,nValue:e.target.value})}
                      style={{width:80,padding:"10px 14px",border:"2px solid #6366f1",borderRadius:8,fontSize:16,fontWeight:700,textAlign:"center",fontFamily:"inherit"}}
                      placeholder="425" onKeyDown={e=>{if(e.key==="Enter")confirmN();}}/>
                    <span style={{fontSize:15,fontWeight:600}}>회</span>
                    <button onClick={confirmN}
                      style={{marginLeft:8,padding:"10px 20px",background:"#6366f1",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:700,fontFamily:"inherit"}}>
                      확인
                    </button>
                  </div>
                </div>
              )}

              {/* Step: Preview */}
              {docModal.step==="preview" && (
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                    <p style={{fontSize:13,color:"#64748b",margin:0}}>내용을 확인하고 복사하세요. 편집도 가능합니다.</p>
                    <div style={{display:"flex",gap:6}}>
                      {DOC_TEMPLATES[docModal.catId]?.titles.length > 1 && (
                        <button onClick={()=>setDocModal({...docModal,step:"select",titleId:"",nValue:docModal.nValue})}
                          style={{padding:"6px 12px",border:"1px solid #e2e8f0",borderRadius:6,background:"#fff",fontSize:12,fontWeight:600,fontFamily:"inherit",color:"#64748b"}}>
                          ← 제목 변경
                        </button>
                      )}
                    </div>
                  </div>
                  <textarea value={docModal.docText} onChange={e=>setDocModal({...docModal,docText:e.target.value})}
                    style={{width:"100%",minHeight:320,padding:"16px 18px",border:"1px solid #e2e8f0",borderRadius:10,fontSize:14,lineHeight:1.8,
                      fontFamily:"'Noto Sans KR',monospace",color:"#1e293b",resize:"vertical",background:"#fafbfc"}}/>
                  <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:14}}>
                    <button onClick={()=>setDocModal(null)}
                      style={{padding:"10px 20px",border:"1px solid #e2e8f0",borderRadius:8,background:"#fff",fontSize:13.5,fontWeight:600,fontFamily:"inherit",color:"#64748b"}}>
                      닫기
                    </button>
                    <button onClick={copyDoc}
                      style={{padding:"10px 24px",background:copied?"#10b981":"#6366f1",color:"#fff",border:"none",borderRadius:8,fontSize:13.5,fontWeight:700,fontFamily:"inherit",
                        boxShadow:"0 2px 8px rgba(99,102,241,.25)",transition:"background .2s"}}>
                      {copied ? "✓ 복사됨!" : "📋 전체 복사"}
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const S = {
  wrap:{display:"flex",minHeight:"100vh",background:"transparent",color:"var(--gray-900)"},
  nav:{width:260,background:"linear-gradient(180deg,#0f172a 0%,#131c2e 100%)",display:"flex",flexDirection:"column",top:0,height:"100vh",flexShrink:0,overflow:"auto"},
  nb:{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",width:"100%",border:"none",borderRadius:8,background:"transparent",fontSize:13,fontWeight:500,color:"#94a3b8",textAlign:"left",fontFamily:"inherit",marginBottom:2,transition:"all var(--transition-fast)"},
  nbA:{background:"rgba(99,102,241,.12)",color:"#fff",fontWeight:700},
  ns:{padding:"7px 14px",border:"none",borderRadius:6,background:"transparent",fontSize:11.5,fontWeight:500,color:"var(--gray-500)",textAlign:"left",fontFamily:"inherit",width:"100%",transition:"all var(--transition-fast)"},
  main:{flex:1,padding:"10px 24px 24px",minWidth:0,maxWidth:1200,overflowX:"hidden",margin:"0 auto"},
  pt:{fontSize:20,fontWeight:800,letterSpacing:"-0.5px",marginBottom:3,color:"var(--gray-900)"},
  pd:{fontSize:12.5,color:"var(--gray-400)",marginBottom:16,fontWeight:500},
  empty:{textAlign:"center",padding:"52px 24px",background:"#fff",borderRadius:"var(--radius-lg)",border:"1px solid var(--gray-200)",boxShadow:"var(--shadow-sm)"},
  pri:{padding:"9px 20px",background:"linear-gradient(135deg,#4f46e5 0%,#4338ca 100%)",color:"#fff",border:"none",borderRadius:"var(--radius-sm)",fontSize:13,fontWeight:700,
    boxShadow:"0 2px 8px rgba(79,70,229,.2),inset 0 1px 0 rgba(255,255,255,.1)",fontFamily:"inherit"},
  sec2:{padding:"9px 20px",background:"#fff",color:"var(--gray-600)",border:"1px solid var(--gray-200)",borderRadius:"var(--radius-sm)",fontSize:13,fontWeight:600,fontFamily:"inherit",
    boxShadow:"var(--shadow-sm)"},
  sec:{background:"#fff",borderRadius:"var(--radius-md)",padding:"16px 18px",marginBottom:16,border:"1px solid var(--gray-200)",boxShadow:"var(--shadow-sm)"},
  st:{fontSize:14,fontWeight:700,marginBottom:12,color:"var(--gray-800)"},
  drop:{border:"2px dashed var(--gray-300)",borderRadius:"var(--radius-xl)",padding:"52px 24px",textAlign:"center",cursor:"pointer",background:"#fff",transition:"all var(--transition-normal)"},
  dropA:{borderColor:"var(--primary)",background:"#f5f3ff"},
  toolbar:{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,marginBottom:10,flexWrap:"wrap",padding:"8px 0"},
  fbtn:{padding:"6px 14px",border:"1px solid var(--gray-200)",borderRadius:"var(--radius-sm)",background:"#fff",fontSize:12,fontWeight:600,color:"var(--gray-600)",fontFamily:"inherit",
    boxShadow:"var(--shadow-sm)",transition:"all var(--transition-fast)"},
  fbtnA:{background:"var(--gray-900)",color:"#fff",borderColor:"var(--gray-900)",boxShadow:"0 2px 6px rgba(15,23,42,.15)"},
  bbtn:{padding:"6px 14px",background:"linear-gradient(135deg,#d97706,#b45309)",color:"#fff",border:"none",borderRadius:"var(--radius-sm)",fontSize:12,fontWeight:700,whiteSpace:"nowrap",fontFamily:"inherit",
    boxShadow:"0 2px 6px rgba(217,119,6,.2)"},
  sel:{padding:"6px 10px",border:"1.5px solid var(--gray-200)",borderRadius:"var(--radius-sm)",fontSize:12,width:"100%",background:"#fff",color:"var(--gray-700)",marginBottom:2,transition:"border-color var(--transition-fast)"},
  badge:{display:"inline-block",padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700,letterSpacing:"-.2px"},
  tw:{borderRadius:"var(--radius-md)",border:"1px solid var(--gray-200)",overflow:"auto",background:"#fff",boxShadow:"var(--shadow-sm)"},
  tbl:{width:"100%",borderCollapse:"collapse",fontSize:12.5},
  th:{padding:"10px 10px",borderBottom:"2px solid var(--gray-200)",fontWeight:700,textAlign:"left",fontSize:10.5,color:"var(--gray-400)",whiteSpace:"nowrap",letterSpacing:"0.3px",textTransform:"none"},
  thc:{padding:"10px 8px",borderBottom:"2px solid var(--gray-200)",width:30,textAlign:"center"},
  td:{padding:"9px 10px",fontSize:12.5},
  tdc:{padding:"9px 8px",textAlign:"center"},
  inp:{padding:"4px 8px",border:"1.5px solid var(--gray-200)",borderRadius:"var(--radius-sm)",fontSize:11,flex:1,minWidth:55,color:"var(--gray-700)",background:"var(--gray-50)",fontFamily:"inherit",transition:"all var(--transition-fast)"},
  tiny:{border:"none",background:"none",fontSize:12,padding:"2px 6px",borderRadius:4,fontWeight:600,transition:"all var(--transition-fast)"},
  pvTh:{padding:"9px 12px",background:"var(--gray-50)",borderBottom:"2px solid var(--gray-200)",fontWeight:700,fontSize:10.5,color:"var(--gray-400)",textAlign:"left",whiteSpace:"nowrap",letterSpacing:"0.3px"},
  pvTd:{padding:"9px 12px",fontSize:12.5,whiteSpace:"nowrap"},
};

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
